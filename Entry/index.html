            cursor: pointer;

            transition: all 0.3s;
            line-height: 1;
        }
        .menu-toggle:hover { background: var(--bg-secondary); }
        .hamburger-icon {

            display: flex;
            align-items: center;
            width: 18px;
            height: 18px;
        }

        #current-page-title {

            color: #333;

            display: flex;
            align-items: center;
            width: 12px;
            height: 12px;
        }

            top: 50px;
            left: 40px;
            background: var(--card-bg);

            z-index: 200;
            min-width: 220px;

            gap: 5px;

            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

            border: none;
            padding: 10px 15px;

            cursor: pointer;
            font-size: 1.15rem;
            color: #666;

            color: var(--text-secondary);
