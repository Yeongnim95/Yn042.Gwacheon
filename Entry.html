<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    
    <meta name="theme-color" content="#f5f0e8" id="themeColorMeta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <title>Entry System</title>
    <style>
        :root {
            --primary-green: #43a047;
            --dark-green: #2e7d32;
            --light-green-bg: #f0ede5;
            --border-color: #d5cfc5;
            --text-color: #333;
            --danger-red: #e53935;
            
            --bg-color: #f5f0e8;
            --bg-secondary: #ece7df;
            --card-bg: #faf8f4;
            --text-primary: #333;
            --text-secondary: #555;
            --text-muted: #999;
            --border-light: #d5cfc5;
            --border-lighter: #e0dbd3;
            --border-lightest: #eae5dd;
            --shadow-color: rgba(80, 60, 40, 0.08);
            --input-bg: #faf8f4;
            --nav-bg: #ece7df;
        }
        
        * { box-sizing: border-box; }
        
        html {
            min-height: 100%;
            min-height: -webkit-fill-available;
            margin: 0;
            padding: 0;
            background-color: #f5f0e8;
            font-size: clamp(15px, 1.5vw, 17px);
        }

        body {
            font-family: "Noto Sans KR", "Noto Sans TC",
                         "Apple SD Gothic Neo", "Malgun Gothic", "Microsoft JhengHei",
                         "Segoe UI", -apple-system, BlinkMacSystemFont,
                         "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", 
                         sans-serif;
            background: transparent;
            min-height: 100%;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            margin: 0;
            padding: 0;
            padding-bottom: env(safe-area-inset-bottom);
            color: var(--text-primary);
            transition: color 0.3s;
        }

        /* --- 密碼鎖 --- */
        .password-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
        }
        .password-overlay.hidden { display: none; }
        .password-overlay input {
            padding: 12px 20px;
            border: 2px solid var(--border-light);
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: inherit;
            width: 220px;
        }
        .password-overlay input:focus { border-color: var(--primary-green); }
        .password-overlay .pw-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-green);
        }
        .password-overlay .pw-error {
            color: var(--danger-red);
            font-size: 0.9rem;
            min-height: 1.2em;
        }

        /* --- 導航列 --- */
        nav {
            background: var(--nav-bg);
            padding: 0 15px;
            box-shadow: 0 2px 10px var(--shadow-color);
            display: flex;
            transition: background 0.3s;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left { display: flex; align-items: center; position: relative; }

        .nav-title {
            font-weight: bold;
            color: var(--primary-green);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
        }

        .menu-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 25px;
            cursor: pointer;
            margin-left: 15px;
            transition: all 0.3s;
            line-height: 1;
        }
        .menu-toggle:hover { background: var(--bg-secondary); }
        .hamburger-icon {
            color: var(--primary-green);
            display: flex;
            align-items: center;
            width: 18px;
            height: 18px;
        }
        .hamburger-icon svg { width: 100%; height: 100%; }
        #current-page-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: #333;
            line-height: 1;
        }
        .dropdown-arrow {
            color: #666;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            width: 12px;
            height: 12px;
        }
        .dropdown-arrow svg { width: 100%; height: 100%; }
        .menu-toggle.open .dropdown-arrow { transform: rotate(180deg); }

        .menu-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            left: 40px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 10px;
            z-index: 200;
            min-width: 220px;
            animation: dropdownFadeIn 0.2s ease;
        }
        .menu-dropdown.show {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        @keyframes dropdownFadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-btn {
            background: transparent;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.15rem;
            color: #666;
            transition: all 0.3s;
            text-align: left;
        }
        .menu-btn:hover { background: #e8f5e9; }
        .menu-btn.active { background-color: var(--primary-green); color: white; font-weight: bold; }

        .lang-select {
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid var(--border-light);
            background: var(--input-bg);
            font-size: 0.9rem;
            color: var(--text-secondary);
            outline: none;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        .settings-group { display: flex; align-items: center; gap: 10px; }

        /* --- 容器 --- */
        .container {
            width: calc(100% - 30px);
            max-width: 1400px;
            margin: 15px auto;
            background: var(--bg-color);
            border-radius: 16px;
            box-shadow: 0 10px 30px var(--shadow-color);
            padding: 25px;
            min-height: 600px;
            transition: background 0.3s, box-shadow 0.3s;
        }
        
        @media (min-width: 1600px) { .container { max-width: 1500px; } }
        @media (max-width: 768px) { .container { width: calc(100% - 20px); margin: 10px auto; padding: 20px 15px; border-radius: 12px; } }
        @media (max-width: 480px) { .container { width: calc(100% - 16px); margin: 8px auto; padding: 15px 12px; border-radius: 10px; } }

        .page-section { display: none; animation: fadeIn 0.3s ease; }
        .page-section.active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h2 {
            color: var(--dark-green);
            border-bottom: 3px solid #a8e063;
            padding-bottom: 10px;
            margin-top: 0;
        }

        /* --- 表單 --- */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-full-width { grid-column: 1 / -1; }
        .form-group { margin-bottom: 5px; min-width: 0; }
        
        label { display: block; margin-bottom: 6px; font-weight: bold; color: var(--dark-green); font-size: 0.9rem; }
        
        input, select, textarea {
            width: 100%; max-width: 100%; padding: 10px; 
            border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 15px; outline: none;
            box-sizing: border-box; min-width: 0;
            background-color: var(--card-bg);
            color: var(--text-primary);
            font-family: inherit;
        }
        
        input[type="date"] {
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
            min-height: 44px;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--primary-green); box-shadow: 0 0 0 2px rgba(67, 160, 71, 0.15); }

        /* 生日/年紀輸入框 */
        .birthday-input-wrapper { display: flex; align-items: center; gap: 5px; }
        .birthday-input-wrapper input { text-align: center; }
        #profileBirthYear { width: 70px; }
        #profileBirthMonth, #profileBirthDay { width: 50px; }
        .birthday-separator { color: #666; font-weight: bold; }
        .age-input { width: 55px; }
        .age-unit { color: #666; font-size: 0.9rem; }

        .status-bar {
            grid-column: 1 / -1; padding: 10px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 10px; display: none;
        }
        .status-found { background: #e8f5e9; color: #2e7d32; }
        .status-new { background: #fff3e0; color: #ef6c00; }
        .status-loading { background: #e3f2fd; color: #1565c0; text-align: center; }

        button.submit-btn {
            width: 100%; padding: 14px; margin-top: 20px;
            background: var(--primary-green); color: white; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        button.submit-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* ===== 訊息重點與需確認訊息區塊 ===== */
        .message-points-section {
            margin-top: 15px; padding: 15px;
            background: #f1f8e9; border-radius: 10px; border: 1px solid #c5e1a5;
        }
        #confirmPointsSection { background: #fff8e1; border-color: #ffe082; }
        #confirmPointsSection .message-points-title { color: #e65100; }
        #confirmPointsSection .message-points-add-btn { background: #ff9800; }
        #confirmPointsSection .message-points-add-btn:hover { background: #e65100; }
        
        .message-points-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .message-points-title { font-weight: 600; color: var(--dark-green); font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }
        .message-points-add-btn {
            background: var(--primary-green); color: white; border: none;
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .message-points-add-btn:hover { background: var(--dark-green); }
        .message-points-list { display: flex; flex-direction: column; gap: 12px; }
        .message-point-item {
            display: flex; flex-direction: column; gap: 8px;
            background: var(--card-bg); padding: 12px; border-radius: 8px;
            border: 1px solid var(--border-lighter); position: relative;
        }
        .message-point-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .message-point-tag-select {
            flex: 1; padding: 8px 12px; border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 0.9rem; background: var(--card-bg);
        }
        .message-point-content {
            width: 100%; padding: 10px; border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 0.95rem; resize: vertical; min-height: 60px;
            line-height: 1.5; box-sizing: border-box;
        }
        .message-point-remove {
            background: #ffcdd2; color: #b71c1c; border: none;
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .message-point-remove:hover { background: #ef9a9a; }
        .message-points-empty { color: #888; font-size: 0.85rem; text-align: center; padding: 10px; }

        /* ===== 版本更新提醒 ===== */
        .version-update-toast {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            z-index: 9999; background: var(--card-bg);
            border: 1px solid var(--primary-green); border-radius: 14px;
            padding: 14px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            display: flex; align-items: center; gap: 12px;
            transition: transform 0.4s ease; max-width: calc(100vw - 40px);
        }
        .version-update-toast.show { transform: translateX(-50%) translateY(0); }
        .version-update-text { font-size: 13px; color: var(--text-primary); line-height: 1.5; }
        .version-update-btn {
            padding: 6px 16px; border: none; border-radius: 8px;
            background: var(--primary-green); color: white; font-size: 13px;
            font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit;
        }
        .version-update-btn:hover { filter: brightness(1.1); }
        .version-update-close { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 0 4px; }

        /* RWD */
        @media (max-width: 700px) {
            .container { padding: 20px 15px; margin: 10px auto; width: 95%; }
            .form-grid { grid-template-columns: 1fr; }
            .nav-title span { display: none; }
            input, select, textarea { width: 100% !important; max-width: 100% !important; }
            input[type="date"] { width: 100% !important; max-width: 100% !important; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        }
    </style>
</head>
<body>

<!-- 密碼鎖 -->
<div class="password-overlay" id="passwordOverlay">
    <div class="pw-title">🔒</div>
    <input type="password" id="passwordInput" placeholder="비밀번호 입력" autofocus>
    <div class="pw-error" id="passwordError"></div>
</div>

<nav>
    <div class="nav-left">
        <div class="nav-title">🌱</div>
        <div class="menu-toggle" onclick="window.toggleMenu()">
            <span class="hamburger-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></span>
            <span id="current-page-title">등록 시스템</span>
            <span class="dropdown-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>
        </div>
        <div class="menu-dropdown" id="menuDropdown">
            <button class="menu-btn active" onclick="window.switchPage('entry')" id="btn-entry">등록 시스템</button>
            <button class="menu-btn" onclick="window.switchPage('profile')" id="btn-profile">개인정보</button>
        </div>
    </div>
    <div class="settings-group">
        <select class="lang-select" onchange="window.setLanguage(this.value)">
            <option value="ko">한국어</option>
            <option value="zh">中文</option>
        </select>
    </div>
</nav>

<div class="container">
    <!-- 登錄系統 -->
    <div id="entrySection" class="page-section active-section">
        <h2 id="txt-entry-header">전도 섭외자 등록</h2>
        <div id="statusMsg" class="status-bar"></div>

        <div class="form-grid">
            <div class="form-group">
                <label id="lbl-id">번호</label>
                <input type="text" id="idInput" placeholder="9999" oninput="window.handleIdInput()">
            </div>
            <div class="form-group">
                <label id="lbl-name">이름</label>
                <input type="text" id="nameInput" placeholder="이름 입력" oninput="window.handleNameInput()">
            </div>
            <div class="form-group">
                <label id="lbl-date">날짜</label>
                <input type="date" id="recordDate">
            </div>
            <div class="form-group">
                <label id="lbl-type">회신 유형</label>
                <select id="replyType">
                    <option value="me" id="opt-me">내가 회신</option>
                    <option value="other" id="opt-other">상대방 회신</option>
                </select>
            </div>
            <div class="form-group form-full-width">
                <label id="lbl-content">내용</label>
                <textarea id="content" rows="5" placeholder="내용을 입력하세요..."></textarea>
            </div>
            
            <!-- 訊息重點區塊 -->
            <div class="form-group form-full-width">
                <div class="message-points-section" id="messagePointsSection">
                    <div class="message-points-header">
                        <span class="message-points-title" id="messagePointsTitle">📌 訊息重點</span>
                        <button class="message-points-add-btn" onclick="window.addMessagePoint()" title="新增重點">+</button>
                    </div>
                    <div class="message-points-list" id="messagePointsList">
                        <div class="message-points-empty" id="messagePointsEmpty">點擊 + 新增訊息重點</div>
                    </div>
                </div>
            </div>
            
            <!-- 需確認訊息區塊 -->
            <div class="form-group form-full-width">
                <div class="message-points-section" id="confirmPointsSection">
                    <div class="message-points-header">
                        <span class="message-points-title" id="confirmPointsTitle">❓ 需確認的訊息</span>
                        <button class="message-points-add-btn" onclick="window.addConfirmPoint()" title="新增確認項目">+</button>
                    </div>
                    <div class="message-points-list" id="confirmPointsList">
                        <div class="message-points-empty" id="confirmPointsEmpty">點擊 + 新增需確認的訊息</div>
                    </div>
                </div>
            </div>
        </div>
        <button class="submit-btn" onclick="window.submitData()" id="btn-submit">등록하기 (Cloud Sync)</button>
    </div>

    <!-- 個人資料 -->
    <div id="profileSection" class="page-section">
        <h2 id="txt-profile-header">개인정보 등록</h2>
        <div id="profileStatusMsg" class="status-bar"></div>

        <div class="form-grid">
            <div class="form-group">
                <label id="lbl-profile-id">번호</label>
                <input type="text" id="profileIdInput" placeholder="9999" oninput="window.handleProfileIdInput()">
            </div>
            <div class="form-group">
                <label id="lbl-profile-name">이름</label>
                <input type="text" id="profileNameInput" placeholder="이름 입력" oninput="window.handleProfileNameInput()">
            </div>
            <div class="form-group">
                <label id="lbl-profile-location">거주지</label>
                <input type="text" id="profileLocation" placeholder="">
            </div>
            <div class="form-group">
                <label id="lbl-profile-phone">휴대폰</label>
                <input type="tel" id="profilePhone" placeholder="">
            </div>
            <div class="form-group">
                <label id="lbl-profile-contact">연락 방법</label>
                <select id="profileContact">
                    <option value="" id="opt-contact-none">선택하세요</option>
                    <option value="FACEBOOK">FACEBOOK</option>
                    <option value="IG">IG</option>
                    <option value="SLOWLY">SLOWLY</option>
                    <option value="LINE">LINE</option>
                </select>
            </div>
            <div class="form-group">
                <label id="lbl-profile-contact-id">연락처 ID</label>
                <input type="text" id="profileContactId" placeholder="">
            </div>
            <div class="form-group form-full-width">
                <label id="lbl-profile-birthday">생일 / 나이</label>
                <div class="birthday-input-wrapper">
                    <input type="text" id="profileBirthYear" placeholder="YYYY" maxlength="4" inputmode="numeric" pattern="[0-9]*" oninput="window.handleBirthYearInput(this)">
                    <span class="birthday-separator">/</span>
                    <input type="text" id="profileBirthMonth" placeholder="MM" maxlength="2" inputmode="numeric" pattern="[0-9]*" oninput="window.handleBirthMonthInput(this)">
                    <span class="birthday-separator">/</span>
                    <input type="text" id="profileBirthDay" placeholder="DD" maxlength="2" inputmode="numeric" pattern="[0-9]*" oninput="window.handleBirthDayInput(this)">
                    <span class="birthday-separator">,</span>
                    <input type="text" id="profileAge" placeholder="나이" maxlength="3" inputmode="numeric" pattern="[0-9]*" class="age-input">
                    <span class="age-unit" id="age-unit">세</span>
                </div>
            </div>
            <div class="form-group">
                <label id="lbl-profile-mbti">MBTI</label>
                <input type="text" id="profileMbti" placeholder="MBTI" maxlength="4" style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label id="lbl-profile-job">직업</label>
                <input type="text" id="profileJob" placeholder="">
            </div>
        </div>
        <button class="submit-btn" onclick="window.saveProfile()" id="btn-profile-save">저장하기</button>
    </div>
</div>

<!-- 版本更新提醒 -->
<div class="version-update-toast" id="versionUpdateToast">
    <div class="version-update-text" id="versionUpdateText">有新版本可用，請更新</div>
    <button class="version-update-btn" onclick="location.reload(true)" id="versionUpdateBtn">更新</button>
    <button class="version-update-close" onclick="document.getElementById('versionUpdateToast').classList.remove('show')">✕</button>
</div>

<!-- 密碼鎖（普通 script，非 module） -->
<script>
(function() {
    const CORRECT_PW = '0042042500265';
    const overlay = document.getElementById('passwordOverlay');
    const input = document.getElementById('passwordInput');
    const errorEl = document.getElementById('passwordError');

    // 檢查是否已驗證（session 內有效）
    if (sessionStorage.getItem('entry_unlocked') === 'true') {
        overlay.classList.add('hidden');
    }

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (input.value === CORRECT_PW) {
                sessionStorage.setItem('entry_unlocked', 'true');
                overlay.classList.add('hidden');
            } else {
                errorEl.textContent = '비밀번호가 올바르지 않습니다';
                input.value = '';
                input.focus();
            }
        }
    });
})();
</script>

    window.handleTagChange = (selectEl) => {
        const lastOption = pointTags[currentLang]?.[5] || '직접 입력';
        if (selectEl.value === lastOption) {
            const customTag = prompt(currentLang === 'ko' ? '태그를 입력하세요:' : '請輸入自訂標籤:');
            if (customTag && customTag.trim()) {
                const option = document.createElement('option');
                option.value = customTag.trim();
                option.textContent = customTag.trim();
                option.selected = true;
                selectEl.insertBefore(option, selectEl.lastElementChild);
            } else {
                selectEl.selectedIndex = 0;
            }
        }

    function getMessagePoints() {
        const items = document.getElementById('messagePointsList').querySelectorAll('.message-point-item');
        const points = [];
        items.forEach(item => {
            const tag = item.querySelector('.message-point-tag-select')?.value || '';
            const content = item.querySelector('.message-point-content')?.value?.trim() || '';
            if (tag && content) points.push({ tag, content });
        });
        return points;
    }

    function getConfirmPoints() {
        const items = document.getElementById('confirmPointsList').querySelectorAll('.message-point-item');
        const points = [];
        items.forEach(item => {

            const content = item.querySelector('.message-point-content')?.value?.trim() || '';
            if (tag && content) points.push({ tag, content });
        });
        return points;

        const msgList = document.getElementById('messagePointsList');
        if (msgList) msgList.querySelectorAll('.message-point-item').forEach(item => item.remove());

        if (msgEmpty) msgEmpty.style.display = 'block';

        if (confList) confList.querySelectorAll('.message-point-item').forEach(item => item.remove());
        const confEmpty = document.getElementById('confirmPointsEmpty');
        if (confEmpty) confEmpty.style.display = 'block';

    function updateMessagePointsLanguage() {
        const isKo = currentLang === 'ko';
        const msgTitle = document.getElementById('messagePointsTitle');
        const confTitle = document.getElementById('confirmPointsTitle');
        const msgEmpty = document.getElementById('messagePointsEmpty');
        const confEmpty = document.getElementById('confirmPointsEmpty');
        if (msgTitle) msgTitle.textContent = isKo ? '📌 메시지 포인트' : '📌 訊息重點';
        if (confTitle) confTitle.textContent = isKo ? '❓ 확인 필요 사항' : '❓ 需確認的訊息';
        if (msgEmpty) msgEmpty.textContent = isKo ? '+ 버튼을 눌러 추가하세요' : '點擊 + 新增訊息重點';
        if (confEmpty) confEmpty.textContent = isKo ? '+ 버튼을 눌러 추가하세요' : '點擊 + 新增需確認的訊息';
        const tags = pointTags[currentLang] || pointTags.ko;
        document.querySelectorAll('.message-point-tag-select').forEach(select => {
            const currentValue = select.value;
            const isCustom = !tags.includes(currentValue);
            select.innerHTML = createTagOptions();
            if (isCustom && currentValue) {
                const option = document.createElement('option');
                option.value = currentValue; option.textContent = currentValue; option.selected = true;
                select.insertBefore(option, select.lastElementChild);
            } else if (tags.includes(currentValue)) {
                select.value = currentValue;
            }
        });
        document.querySelectorAll('#messagePointsList .message-point-content').forEach(input => {
            input.placeholder = isKo ? '내용을 입력하세요...' : '請輸入內容...';
        });
        document.querySelectorAll('#confirmPointsList .message-point-content').forEach(input => {
            input.placeholder = isKo ? '확인할 내용...' : '需確認的內容...';
        });
    }

    // --- 提交資料 ---
    window.submitData = async () => {
        if (!cloudEnabled) { alert(i18n[currentLang].msgCloudError); return; }
        const t = i18n[currentLang];
        const id = document.getElementById('idInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();
        const date = document.getElementById('recordDate').value;
        const typeSelect = document.getElementById('replyType').value;
        const content = document.getElementById('content').value.trim();

        if (!id || !name || !date || !content) { alert(t.alertIncomplete); return; }

        const existingUserById = localDb.find(u => u.id === id);
        if (existingUserById && existingUserById.name !== name) {
            alert(t.errIdConflict + `\n(ID: ${id} -> ${existingUserById.name})`);
            return;
        }
        const existingUserByName = localDb.find(u => u.name === name);
        if (existingUserByName && existingUserByName.id !== id) {
            alert(t.errNameConflict + `\n(${name} -> ID: ${existingUserByName.id})`);
            return;
        }

        let typeLabel = (typeSelect === 'me') ? 'me' : 'other';
        const userRef = doc(dbInstance, "missionary_data", id);
        const messagePoints = getMessagePoints();
        const confirmPoints = getConfirmPoints();
        const timestamp = new Date().getTime();
        const newLogEntry = { 
            date, type: typeLabel, content, createdAt: timestamp,
            messagePoints: messagePoints.length > 0 ? messagePoints : null,
            confirmPoints: confirmPoints.length > 0 ? confirmPoints : null
        };

        if (existingUserById) {
            const updatedLogs = [...existingUserById.logs, newLogEntry];
            await setDoc(userRef, { id, name, logs: updatedLogs }, { merge: true });
            alert(t.alertUpdate + name);
        } else {
            await setDoc(userRef, { id, name, logs: [newLogEntry] });
            alert(t.alertCreate + name);
        }
        document.getElementById('content').value = '';
        clearMessagePoints();
    };

        const t = i18n[currentLang];
        const id = document.getElementById('profileIdInput').value.trim();
        const name = document.getElementById('profileNameInput').value.trim();
        if (!id) { alert(t.alertProfileIdRequired); return; }

        const profileData = {
            location: document.getElementById('profileLocation').value.trim(),
            phone: document.getElementById('profilePhone').value.trim(),
            contact: document.getElementById('profileContact').value,
            contactId: document.getElementById('profileContactId').value.trim(),
            birthYear: document.getElementById('profileBirthYear').value.trim(),
            birthMonth: document.getElementById('profileBirthMonth').value.trim(),
            birthDay: document.getElementById('profileBirthDay').value.trim(),
            age: document.getElementById('profileAge').value.trim(),
            mbti: document.getElementById('profileMbti').value.trim().toUpperCase(),
            job: document.getElementById('profileJob').value.trim()
        };

        const userRef = doc(dbInstance, "missionary_data", id);
        const existingUser = localDb.find(u => u.id === id);
        if (existingUser) {
            await updateDoc(userRef, { profile: profileData });
        } else if (name) {
            await setDoc(userRef, { id, name, logs: [], profile: profileData });
        } else {
            alert(t.alertIncomplete);
            return;
        }
        alert(t.alertProfileSaved);
    };

    // --- 生日輸入處理 ---
    window.handleBirthYearInput = (input) => {
        input.value = input.value.replace(/[^0-9]/g, '');
        if (input.value.length === 4) document.getElementById('profileBirthMonth').focus();
        window.calculateAge();
    };
    window.handleBirthMonthInput = (input) => {
        input.value = input.value.replace(/[^0-9]/g, '');
        if (input.value.length === 2) document.getElementById('profileBirthDay').focus();
        window.calculateAge();
    };
    window.handleBirthDayInput = (input) => {
        input.value = input.value.replace(/[^0-9]/g, '');
        if (input.value.length === 2) document.getElementById('profileAge').focus();
        window.calculateAge();
    };
    window.calculateAge = () => {
        const y = document.getElementById('profileBirthYear').value.trim();
        const m = document.getElementById('profileBirthMonth').value.trim();
        const d = document.getElementById('profileBirthDay').value.trim();
        if (y && m && d && y.length === 4 && m.length >= 1 && d.length >= 1) {
            const year = parseInt(y, 10), month = parseInt(m, 10), day = parseInt(d, 10);
            if (!isNaN(year) && !isNaN(month) && !isNaN(day) && month >= 1 && month <= 12 && day >= 1 && day <= 31) {
                const today = new Date();
                const birthDate = new Date(year, month - 1, day);
                let age = today.getFullYear() - birthDate.getFullYear();
                const monthDiff = today.getMonth() - birthDate.getMonth();
                if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;
                if (age >= 0 && age < 150) document.getElementById('profileAge').value = age;
            }
        }
    };

    // --- 版本檢查 ---
    async function checkForUpdates() {
        try {
            const res = await fetch(window.location.href, { cache: 'no-store', method: 'HEAD' });
            const etag = res.headers.get('etag') || res.headers.get('last-modified') || '';
            const savedEtag = localStorage.getItem('entry_etag');
            if (savedEtag && etag && savedEtag !== etag) {
                const toast = document.getElementById('versionUpdateToast');
                const text = document.getElementById('versionUpdateText');
                const btn = document.getElementById('versionUpdateBtn');
                if (text) text.textContent = currentLang === 'ko' ? '새 버전이 있습니다. 업데이트해 주세요' : '有新版本可用，請更新網頁';
                if (btn) btn.textContent = currentLang === 'ko' ? '업데이트' : '更新';
                if (toast) toast.classList.add('show');
            }
            if (etag) localStorage.setItem('entry_etag', etag);
        } catch (e) {}
    }

    // --- 初始化 ---
    window.onload = function() {
        document.querySelector('.lang-select').value = currentLang;
        switchPage('entry');
        applyLanguage();
        updateDateInput();
        checkForUpdates();
        setInterval(checkForUpdates, 5 * 60 * 1000);
    };

</script>
</body>
</html>
